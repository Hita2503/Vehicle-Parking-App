<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
               <h1>Login Page</h1>
               <form action="/login" method = post>
                
                    <div class="mb-3">
                        <label for="EmailID" class="form-label">Registered Email ID</label>
                        <input type="text" class="form-control" id="Email ID" placeholder="name@example.com" name = "email">
                    </div>

                    <div class="mb-3">
                        <label for="Password field" class="form-label">Password</label>
                        <input type="password" class="form-control" id="Password field" placeholder="Your Password" name = pwd>
                    </div>
                    
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value = "Login"> <!--cannot use button tags because we are not using java script-->
                        <br>
                        <a href="/register">Create Account</a>
                    </div>
                </form>
                

                  
                 
            </div>
        </div>
    </div>
</body>
</html>
