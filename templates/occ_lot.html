<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Occupied Parking Spot Details</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <style>
        
        #canvas {
          height: 800px; 
          margin: 0 auto;
          display: flex;
          justify-content: center;
          align-items: center;
        }
      
        #form-body {
          height: auto; 
          width: 60%;
          margin: 0 auto;
          padding: 20px;
          border-radius: 8px;
        }
      </style>
      

</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="edit-form-body">
                <h1>Details of occupied Parking Spot</h1>
                
                <div class="mb-3">
                    <label for="spotID" class="form-label">Spot ID</label>
                    <input type="text" class="form-control" id="spotID" value="{{ reservation.spot_id }}">
                </div>

                <div class="mb-3">
                    <label for="mailID" class="form-label">Email ID</label>
                    <input type="text" class="form-control" id="mailID" value="{{ user.email }}">
                </div>

                <div class="mb-3">
                  <label for="userID" class="form-label">User ID</label>
                  <input type="text" class="form-control" id="userID" value="{{ user.username }}">
              </div>

                <div class="mb-3">
                    <label for="vehicleNo" class="form-label">Vehicle Number</label>
                    <input type="text" class="form-control" id="vehicleNo" value="{{ reservation.vehicle_number }}">
                </div>

                <div class="mb-3">
                  <label for="parking_time" class="form-label">Time of Parking</label>
                  <input type="text" class="form-control" id="parking_time" value="{{ reservation.parking_timestamp }}">
              </div>
                
                <div class="text-center">
                    <a href="{{ url_for('admin_dash') }}" class="btn btn-danger">Close</a>
                    <!--cannot use button tags because we are not using java script-->
                    <br>
                </div>
                

                  
                 
            </div>
        </div>
    </div>
</body>
</html>
