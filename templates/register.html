<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page Page</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <style>
        
        #canvas {
          height: 800px; 
          margin: 0 auto;
          display: flex;
          justify-content: center;
          align-items: center;
        }
      
        #form-body {
          height: auto; 
          width: 60%;
          margin: 0 auto;
          padding: 20px;
          border-radius: 8px;
        }
      </style>
      

</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
                <h1>User Registration</h1>
                
                <div class="mb-3">
                    <label for="EmailID" class="form-label">Email ID</label>
                    <input type="text" class="form-control" id="EmailID" placeholder="name@example.com">
                </div>

                <div class="mb-3">
                    <label for="Username" class="form-label">Username</label>
                    <input type = "text" class="form-control" id="Username" placeholder="Your username">
                </div>

                <div class="mb-3">
                    <label for="Password field" class="form-label">Password</label>
                    <input type="password" class="form-control" id="Password field" placeholder="Your Password">
                </div>

                <div class="mb-3">
                    <label for="fullname" class="form-label">Full Name</label>
                    <input type = "text" class="form-control" id="fullname" placeholder="Your Name">
                </div>

                <div class="mb-3">
                    <label for="Option" class="form-label">Address</label>
                    <input type = "text" class="form-control" id="Option" placeholder="Your address">
                </div>

                <div class="mb-3">
                    <label for="pincode" class="form-label">Pincode</label>
                    <input type = "text" class="form-control" id="pincode" placeholder="Your 6-digit pincode">
                </div>

                
                
                <div class="text-center">
                    <input type="submit" class="btn btn-primary" value = "Register"> <!--cannot use button tags because we are not using java script-->
                    <br>
                <a href="login.html">Login Here!</a>
                </div>
                

                  
                 
            </div>
        </div>
    </div>
</body>
</html>
