<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>
    <div id="main">
        <div id="canvas">
            <form action="{{ url_for('admin_summary') }}" method="post">
                <nav class="navbar navbar-expand-lg" style="background-color: rgb(58, 58, 61) !important">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="#">Welcome Admin</a>
                        
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                <li class="nav-item">
                                    <a class="nav-link" aria-current="page" href="{{ url_for('admin_dash') }}">Home</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('reg_users') }}">Users</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('admin_search') }}">Search</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('admin_summary') }}">Summary</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                                </li>
                            </ul>
                            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('edit_profile', next='admin_dash') }}">Edit Profile</a>
                                </li>
                            </ul>
                            
                        </div>
                    </div>
                </nav>

                <div class="contents">
                    <h2 class="d-flex justify-content-center  my-4">Overall Parking Trends At A Glance</h2>
                        <h3 class="mt-5 mb-3 text-center">Revenue Distribution</h3>

                        <div style="width: 400px; margin: auto;">
                            <canvas id="revenueChart"></canvas>
                        </div>

                        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                        <script>
                            const ctx = document.getElementById('revenueChart').getContext('2d');
                            const labels = {{ labels | tojson }};
                            const values = {{ values | tojson }};

                            const backgroundColors = labels.map((_, index) =>
                                `hsl(${index * 50}, 70%, 60%)`
                            );

                            const revenueChart = new Chart(ctx, {
                                type: 'pie',
                                data: {
                                    labels: labels,
                                    datasets: [{
                                        data: values,
                                        backgroundColor: backgroundColors,
                                        borderWidth: 1
                                    }]
                                },
                                options: {
                                    plugins: {
                                        legend: {
                                            position: 'bottom',
                                            labels: {
                                                color: 'white',
                                                padding: 15
                                            }
                                        },
                                        title: {
                                            display: true,
                                            color: 'white'
                                        }
                                    }
                                }
                            });
                        </script>
                        <hr>
                        <h3 class="mt-5 mb-3 text-center">Occupancy Status</h3>
                        <div style="width: 600px; margin: auto;">
                            <canvas id="occupancyChart"></canvas>
                        </div>
                        
                        <script>
                            const occupancyLabels = {{ labels | tojson }};
                            const availableData = {{ available | tojson }};
                            const occupiedData = {{ occupied | tojson }};
                        
                            const occupancyChart = new Chart(
                                document.getElementById('occupancyChart').getContext('2d'),
                                {
                                    type: 'bar',
                                    data: {
                                        labels: occupancyLabels,
                                        datasets: [
                                            {
                                                label: 'Available Slots',
                                                data: availableData,
                                                backgroundColor: 'rgba(75, 192, 192, 0.7)',
                                            },
                                            {
                                                label: 'Occupied Slots',
                                                data: occupiedData,
                                                backgroundColor: 'rgba(255, 99, 132, 0.7)',
                                            }
                                        ]
                                    },
                                    options: {
                                        responsive: true,
                                        plugins: {
                                            legend: {
                                                position: 'bottom',
                                                labels: {
                                                    color: 'white'
                                                }
                                            },
                                            title: {
                                                display: true,
                                                color: 'white'
                                            }
                                        },
                                        scales: {
                                            x: {
                                                ticks: {
                                                    color: 'white'
                                                }
                                            },
                                            y: {
                                                beginAtZero: true,
                                                ticks: {
                                                    color: 'white'
                                                }
                                            }
                                        }
                                    }
                                }
                            );
                        </script>
                        



                    
                    
                </div>
                
            </form> 
            
        </div>
    </div>
</body>
</html>
