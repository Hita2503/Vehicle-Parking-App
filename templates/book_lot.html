<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Parking Lot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <style>
        
        #canvas {
          height: 800px; 
          margin: 0 auto;
          display: flex;
          justify-content: center;
          align-items: center;
        }
      
        #form-body {
          height: auto; 
          width: 60%;
          margin: 0 auto;
          padding: 20px;
          border-radius: 8px;
        }
      </style>
      

</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="edit-form-body">
                <form action="{{ url_for('book_lot', lot_id = lot.id) }}" method="post">
                    <h1>Book Parking Lot</h1>
                    
                    <div class="mb-3">
                        <label for="spotID" class="form-label">Spot ID</label>
                        <input type="text" class="form-control" id="spotID" name = "spotID" value="{{ spot.id}} " readonly>
                    </div>

                    <div class="mb-3">
                        <label for="lotID" class="form-label">Lot ID</label>
                        <input type="text" class="form-control" id="lotID" name = "lotID" value="{{ spot.lot_id }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="userID" class="form-label">User ID</label>
                        <input type="text" class="form-control" id="userID"  name = "userID">
                    </div>

                    <div class="mb-3">
                        <label for="vNumber" class="form-label">Vehicle Number</label>
                        <input type = "text" class="form-control" id="vNumber" name = "Vnumber">
                    </div>

                    <div class="mb-3">
                        <label for="ApproxHours" class="form-label">Approximate Number of Hours</label>
                        <input type = "text" class="form-control" id="ApproxHours" name = "approx_hours">
                    </div>
                    
                    <label class="mb-2.5">Do you need a Wheelchair?</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="wheelchair_req" value="No" id="wheelchairNo">
                            <label class="form-check-label" for="wheelchairNo">No</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="wheelchair_req" value="Yes" id="wheelchairYes" checked>
                            <label class="form-check-label" for="wheelchairYes">Yes</label>
                        </div>

                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value = "Reserve"> 
                        <a href="{{ url_for('user_dash') }}" class="btn btn-danger">Cancel</a>
                        <!--cannot use button tags because we are not using java script-->
                        <br>
                    </div>
                </form>
                

                  
                 
            </div>
        </div>
    </div>
</body>
</html>
