<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View/Delete Parking Lot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <style>
        
        #canvas {
          height: 800px; 
          margin: 0 auto;
          display: flex;
          justify-content: center;
          align-items: center;
        }
      
        #form-body {
          height: auto; 
          width: 60%;
          margin: 0 auto;
          padding: 20px;
          border-radius: 8px;
        }
      </style>
      

</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="edit-form-body">
                <form action="{{ url_for('release_spot', reservation_id = reservation.id) }}" method="post">
                    <h1>Release Parking Lot</h1>
                    
                    <div class="mb-3">
                        <label for="spotID" class="form-label">Spot ID</label>
                        <input type="text" class="form-control" id="spotID" value="{{ reservation.spot_id}}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="Vehicle_No" class="form-label">Vehicle Number</label>
                        <input type="text" class="form-control" id="Vehicle_No" value="{{ reservation.vehicle_number }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="parking_Time" class="form-label">Parking Time</label>
                        <input type="text" class="form-control" id="parking_Time" value="{{ reservation.parking_timestamp.strftime('%Y-%m-%d %H:%M') }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="release_Time" class="form-label">Releasing Time</label>
                        {% if reservation.leaving_timestamp %}
                            <input type="text" class="form-control" id="release_Time" value="{{ reservation.leaving_timestamp.strftime('%Y-%m-%d %H:%M') }}" readonly>
                        {% else %}
                            <input type="text" class="form-control" id="release_Time" value="Not yet released" readonly>
                        {% endif %}

                    </div>

                    <div class="mb-3">
                        <label for="Tot_cost" class="form-label">Total Cost</label>
                        <input type="text" class="form-control" id="Tot_cost" value="Rs.{{ total_cost }}" readonly>
                    </div>

                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value = "Release"> 
                        <a href="{{ url_for('user_dash') }}" class="btn btn-danger">Cancel</a>
                        <!--cannot use button tags because we are not using java script-->
                        <br>
                    </div>
                </form> 

                  
                 
            </div>
        </div>
    </div>
</body>
</html>
