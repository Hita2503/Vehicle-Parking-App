<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />

  <style>
    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 10px;
    }

    .card {
      min-width: 200px;
      max-width: 200px;
      height: 420px;
      background-color: #00cfff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .card h5 {
      margin-bottom: 10px;
    }

    .card .container {
      flex-grow: 1;
      overflow-y: auto;
    }

    * {
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div id="main">
    <div id="canvas">
      <form action="{{ url_for('admin_dash') }}" method="post">
        <nav class="navbar navbar-expand-lg" style="background-color: rgb(58, 58, 61) !important">
          <div class="container-fluid">
            <a class="navbar-brand" href="#">Welcome {{ logged_user.full_name }}(Admin)</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{{url_for('admin_dash') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('reg_users') }}">Users</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_search') }}">Search</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_summary') }}">Summary</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
              </ul>
              <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <a class="nav-link" href="{{ url_for('edit_profile', next='admin_dash') }}">Edit Profile</a>

              </ul>
            </div>
          </div>
        </nav>
      </form>

      <div class="contents" style="background-color: rgb(58, 58, 61) !important;">
        <h3 class="heading my-3 text-center">Parking Lots</h3>

        <!-- Card container with flex wrap -->
        <div class="card-container">
          {% for lot in lots %}
            <div class="card text-center">
              <h5>Parking #{{ lot.id }}</h5>
              <div class="d-flex justify-content-center gap-2">
                <a href="{{ url_for('edit_lot', lot_id=lot.id) }}" class="btn btn-warning btn-sm">Edit</a>
                <form action="{{ url_for('delete_lot', lot_id=lot.id) }}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
              </div>
              <p class="text-success mt-2">(Occupied: <br>{{ lot.occupied }}/{{ lot.total }})</p>
              <hr />
              <div class="container">
                <div class="row row-cols-5 gap-3">
                  {% for spot in lot.spots %}
                    <div class="col p-1">
                      <a href="{{ url_for('view_del', spot_id=spot['id']) }}">
                        <button type="button" class="btn btn-sm {% if spot['status'].strip() == 'A' %}btn-success{% else %}btn-danger{% endif %}" style="width: 30px; height: 30px;">
                          {{ spot.status }}
                        </button>
                      </a>
                    </div>
                  {% endfor %}
                </div>
              </div>
            </div>
          {% endfor %}
        </div>

        <div class="text-center mt-3">
          <a href="{{ url_for('new_lot') }}">
            <button type="button" class="btn btn-primary">Add Lot</button>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
