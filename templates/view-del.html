<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View/Delete Parking Lot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <style>
        
        #canvas {
          height: 800px; 
          margin: 0 auto;
          display: flex;
          justify-content: center;
          align-items: center;
        }
      
        #form-body {
          height: auto; 
          width: 60%;
          margin: 0 auto;
          padding: 20px;
          border-radius: 8px;
        }
      </style>
      

</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="edit-form-body">
                <h1>View/Delete Spot</h1>
                
                <div class="mb-3">
                    <label for="id" class="form-label" >ID</label>
                    <input type="text" class="form-control" id="id" value="{{ spot.id }}">
                </div>
                <div class="mb-3">
                    <label for="status" class="form-label" >Status</label>
                    {% if spot.status.strip() == 'O' %}
                        <a href="{{ url_for('occ_lot', spot_id=spot.id) }}" class="btn btn-outline-danger w-100 ">
                            {{ spot.status }} (Click to view reservation details)
                        </a>
                    
                    {% else %}
                        <input type="text" class="form-control text-success" value="{{ spot.status }}" readonly>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label for="location" class="form-label" >Location</label>
                    <input type="text" class="form-control" id="location" value="{{ lot.prime_location_name }}">
                </div>
                
                <div class="text-center d-flex justify-content-evenly mx-5">
                    <form action="{{ url_for('delete_spot', spot_id=spot.id) }}" method="POST">
                        <input type="submit" class="btn btn-primary" value="Delete">
                    </form>
                    
                    <a href=" {{ url_for('admin_dash') }}" class="btn btn-danger">Close</a>
                    <!--cannot use button tags because we are not using java script-->
                </div>
                

                  
                 
            </div>
        </div>
    </div>
</body>
</html>
