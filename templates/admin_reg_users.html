<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>
    <div id="main">
        <div id="canvas">
            <nav class="navbar navbar-expand-lg" style="background-color: rgb(58, 58, 61) !important">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Welcome Admin</a>
                    
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('admin_dash') }}">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" aria-current="page" href="{{ url_for('reg_users') }}">Users</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('admin_search') }}">Search</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('admin_summary') }}">Summary</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('login') }}">Logout</a>
                        </ul>
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('edit_profile', next='admin_dash') }}">Edit Profile</a>
                            </li>
                        </ul>
                        
                    </div>
                </div>
            </nav>
            
            
            <div class="contents">
                <h2 class="heading my-5 d-flex justify-content-center">Registered Users</h2>
                <div class="table">
                    <table class="table table-dark table-striped my-4">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">E-Mail</th>
                                <th scope="col">Full Name</th>
                                <th scope="col">Address</th>
                                <th scope="col">Pincode</th>
                                

                            </tr>
                        </thead>
                        <tbody>
                            {% for user in users %}
                            <tr>
                                <th scope="row">{{ loop.index }}</th>
                                <td>{{ user.email }}</td>
                                <td>{{ user.full_name }}</td>
                                <td>{{ user.address }}</td>
                                <td>{{ user.pincode }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                        
                        

                    </table>
                       
                </div>
                        
            </div>
            
        </div>
    </div>
</body>
</html>
